<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booklingo</title>
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Official PDF.js Viewer CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
            },
            colors: {
              paper: '#fdfbf7',
              ink: '#2d2d2d',
              brand: {
                dark: '#07396B',
                blue: '#067BDC',
                teal: '#09ABA6',
                tealLight: '#71CECB',
                amber: '#FBB12F',
                bg: '#FEFEFE',
                surface: '#F4FAFA',
                border: '#D6ECEB',
                text: '#10243E',
                muted: '#4F6B85',
              },
            }
          }
        }
      }
    </script>
    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      // Initialize PDF.js worker
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #F4FAFA;
        }
        ::-webkit-scrollbar-thumb {
            background: #71CECB;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #09ABA6;
        }

        /* Override generic textLayer styles to ensure they don't conflict with the library's CSS */
        .textLayer {
            opacity: 1; /* Keep text transparent but layer visible for selection */
            mix-blend-mode: multiply;
        }
        
        /* Vivid selection color */
        .textLayer ::selection {
            background: rgba(6, 123, 220, 0.35) !important;
            color: transparent;
        }

        /* Support for Firefox */
        .textLayer ::-moz-selection {
            background: rgba(6, 123, 220, 0.35) !important;
            color: transparent;
        }
        
        /* Dark mode inversion for the canvas ONLY */
        .pdf-dark-mode canvas {
            filter: invert(1) hue-rotate(180deg) contrast(0.8);
        }
        .pdf-sepia-mode canvas {
             filter: sepia(0.4) contrast(0.95);
        }
        
        /* Ensure container centers content */
        .pdf-page-container {
            position: relative;
            margin: 0 auto 2rem auto;
            box-shadow: 0 12px 30px -18px rgba(7, 57, 107, 0.35), 0 0 0 1px rgba(214, 236, 235, 0.9);
        }
    </style>
</head>
  <body class="bg-brand-bg text-brand-text h-screen overflow-hidden">
    <div id="root" class="h-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
