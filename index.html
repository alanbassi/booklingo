<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booklingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Official PDF.js Viewer CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
            },
            colors: {
              paper: '#fdfbf7',
              ink: '#2d2d2d',
            }
          }
        }
      }
    </script>
    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      // Initialize PDF.js worker
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
        /* Custom scrollbar for cleaner look - Dark Mode optimized */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111827; /* gray-900 */
        }
        ::-webkit-scrollbar-thumb {
            background: #374151; /* gray-700 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563; /* gray-600 */
        }

        /* Override generic textLayer styles to ensure they don't conflict with the library's CSS */
        .textLayer {
            opacity: 1; /* Keep text transparent but layer visible for selection */
            mix-blend-mode: multiply;
        }
        
        /* Vivid selection color */
        .textLayer ::selection {
            background: rgba(99, 102, 241, 0.4) !important; /* Indigo-500 @ 40% */
            color: transparent;
        }

        /* Support for Firefox */
        .textLayer ::-moz-selection {
            background: rgba(99, 102, 241, 0.4) !important;
            color: transparent;
        }
        
        /* Dark mode inversion for the canvas ONLY */
        .pdf-dark-mode canvas {
            filter: invert(1) hue-rotate(180deg) contrast(0.8);
        }
        .pdf-sepia-mode canvas {
             filter: sepia(0.4) contrast(0.95);
        }
        
        /* Ensure container centers content */
        .pdf-page-container {
            position: relative;
            margin: 0 auto 2rem auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
  <body class="bg-gray-900 text-gray-100 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
